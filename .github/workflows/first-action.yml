name: First Workflow
on: workflow_dispatch
jobs:
  first-job:
    runs-on: ubuntu-latest
    steps:
      - name: Print greeting
        run: echo "Hello World!"
      - name: Print goodbye
        run: echo "Done - bye!"
      - name: Run multiple commands
        run: |
          echo "First output"
          echo "Second output"

# workflow_dispatch allows us to run this workflow manually.
